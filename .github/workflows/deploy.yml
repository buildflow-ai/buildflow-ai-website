name: Deploy production
on:
  push:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: buildflow-ai-production
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions: { contents: read }
    env:
      PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
      ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22.13.0, cache: npm }
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply buildflow-ai-leads --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
